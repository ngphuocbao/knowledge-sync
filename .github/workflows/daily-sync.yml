name: Daily Knowledge Sync

on:
  schedule:
    - cron: "17 1 * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t knowledge-sync .

      - name: Run knowledge sync job
        env:
          API_KEY: ${{ secrets.API_KEY }}
          GEMINI_FILE_SEARCH_STORE: ${{ vars.GEMINI_FILE_SEARCH_STORE }}
        run: |
          docker run --rm \
            -e API_KEY="$API_KEY" \
            -e GEMINI_FILE_SEARCH_STORE="$GEMINI_FILE_SEARCH_STORE" \
            knowledge-sync